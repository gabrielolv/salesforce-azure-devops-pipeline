trigger: none

pr:
  branches:
    include:
      - develop

jobs:
  - job: SalesforcePRReview
    displayName: "Salesforce Best Practice Review"
    pool:
      vmImage: 'ubuntu-latest'

    variables:
      - group: sfdev

    steps:
      - checkout: self
        fetchDepth: 0
        displayName: "Checkout repository"

      - task: NodeTool@0
        inputs:
          versionSpec: '20.x'
        displayName: "Set up Node.js 20"

      - task: Bash@3
        displayName: "Install review dependencies"
        inputs:
          targetType: 'inline'
          script: npm install
          workingDirectory: $(System.DefaultWorkingDirectory)/.github/scripts

      - task: Bash@3
        displayName: "Run Salesforce PR review"
        env:
          AZURE_TOKEN: $(System.AccessToken)
          ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
          PR_ID: $(System.PullRequest.PullRequestId)
          COLLECTION_URI: $(System.TeamFoundationCollectionUri)
          TEAM_PROJECT: $(System.TeamProject)
          REPO_ID: $(Build.Repository.ID)
          HEAD_COMMIT: $(System.PullRequest.SourceCommitId)
          TARGET_BRANCH: $(System.PullRequest.TargetBranch)
        inputs:
          targetType: 'inline'
          script: node $(System.DefaultWorkingDirectory)/.azure/scripts/review.js
