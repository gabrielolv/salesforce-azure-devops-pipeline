name: Check Salesforce Deploy
description: Validate a Salesforce deployment (dry-run) with optional test configurations

inputs:
  run_all_tests:
    description: Run all local tests
    default: 'false'
  include_sf_command_tests:
    description: Include specific tests from sfCommandTests env var
    default: 'false'
  display_name:
    description: Step display name
    default: 'Check to deploy to Salesforce'

runs:
  using: composite
  steps:
    - name: ${{ inputs.display_name }}
      shell: bash
      run: |
        echo "${{ inputs.display_name }}..."

        sfdx_project_dir=$(find . -name 'sfdx-project.json' -exec dirname {} \; | head -n 1)

        if [ -z "$sfdx_project_dir" ]; then
          echo "sfdx-project.json not found!"
          exit 1
        fi

        cd "$sfdx_project_dir"

        cmd="sf project deploy start --dry-run -x ./delta/package/package.xml --post-destructive-changes ./delta/destructiveChanges/destructiveChanges.xml"

        if [[ "${{ inputs.include_sf_command_tests }}" == "true" ]]; then
          cmd="$cmd $sfCommandTests"
        fi

        if [[ "${{ inputs.run_all_tests }}" == "true" ]]; then
          cmd="$cmd --test-level RunLocalTests"
        fi

        cmd="$cmd --verbose --json --target-org $SF_INSTANCE_NAME"

        echo "Executing: $cmd"
        eval $cmd
        deploy_status=$?

        if [[ "${{ inputs.run_all_tests }}" == "true" && $deploy_status -ne 0 ]]; then
          echo "::warning::Deployment check encountered an issue. Exit status: $deploy_status. Continuing."
        fi
